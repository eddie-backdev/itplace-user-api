spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  datasource:
    source:
      driver-class-name: org.postgresql.Driver
      jdbc-url: ${PG_URL}
      username: ${PG_USERNAME}
      password: ${PG_PASSWORD}
      hikari:
        maximum-pool-size: 30
        minimum-idle: 10
        idle-timeout: 30000
        max-lifetime: 600000
        connection-timeout: 30000
        leak-detection-threshold: 30000
    replica:
      driver-class-name: org.postgresql.Driver
      jdbc-url: ${PG_REPLICA_URL:${PG_URL}}
      username: ${PG_REPLICA_USERNAME:${PG_USERNAME}}
      password: ${PG_REPLICA_PASSWORD:${PG_PASSWORD}}
      hikari:
        maximum-pool-size: 30
        minimum-idle: 10
        idle-timeout: 30000
        max-lifetime: 600000
        connection-timeout: 30000
        leak-detection-threshold: 30000

  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
      password: ${REDIS_PASSWORD:}
    mongodb:
      uri: ${MONGODB_URI}

  jwt:
    secret: ${JWT_SECRET}
    access-token-validity-in-seconds: 3600    # 액세스 토큰 유효기간: 1시간
    refresh-token-validity-in-seconds: 86400  # 리프레시 토큰 유효기간: 24시간
  ai:
    chat:
      categorizePrompt: file:/app/prompts/categorizePrompt.txt
      reasonPrompt: file:/app/prompts/reasonPrompt.txt

    openai:
      api-key: ${OPENAI_API_KEY}
      organization-id: ${OPENAI_ORGANIZATION_ID}
      base-url: https://api.openai.com/
      chat:
        model: gpt-4.1-nano
      embedding:
        model: text-embedding-3-small
      audio:
        enabled: false

  security:
    oauth2:
      client:
        registration:
          kakao:
            redirect-uri: ${KAKAO_REDIRECT_URI}
            client-name: kakao
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

elasticsearch:
  host: ${ELASTICSEARCH_HOST}
  port: 9200
  username: ${ELASTICSEARCH_USERNAME}
  password: ${ELASTICSEARCH_PASSWORD}
  scheme: http
  connectTimeoutMs: 2000
  socketTimeoutMs: 30000

coolsms:
  api:
    key: ${COOLSMS_API_KEY}
    secret: ${COOLSMS_API_SECRET}
  fromPhone: ${COOLSMS_FROM_PHONE}

google:
  recaptcha:
    key:
      url: https://www.google.com/recaptcha/api/siteverify
      secret: ${GOOGLE_RECAPTCHA_SECRET}

springdoc:
  swagger-ui:
    url: /swagger.yml

management:
  endpoints:
    web:
      exposure:
        include: [ "health", "info" ]
  endpoint:
    health:
      show-details: "always"
  health:
    mail:
      enabled: false
    elasticsearch:
      enabled: false
    redis:
      enabled: false