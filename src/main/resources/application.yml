spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

  ai:
    chat:
      categorizePrompt: classpath:prompt/categorizePrompt.txt
      reasonPrompt: classpath:prompt/reasonPrompt.txt
    openai:
      base-url: https://api.openai.com/
      chat:
        model: ${OPENAI_CHAT_MODEL:gpt-5-nano}
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-5-nano}
          temperature: ${OPENAI_CHAT_TEMPERATURE:1.0}
      embedding:
        model: text-embedding-3-small
      audio:
        enabled: false

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-name: kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

elasticsearch:
  scheme: http
  connectTimeoutMs: 2000
  socketTimeoutMs: 30000

google:
  recaptcha:
    key:
      url: https://www.google.com/recaptcha/api/siteverify

app:
  ai:
    indexing:
      enabled: ${AI_INDEXING_ENABLED:false}
    benefits:
      seed:
        enabled: ${BENEFIT_RAG_SEED_ENABLED:${AI_INDEXING_ENABLED:false}}
      sync:
        enabled: ${BENEFIT_RAG_SYNC_ENABLED:${AI_INDEXING_ENABLED:false}}
        initial-delay-ms: ${BENEFIT_RAG_SYNC_INITIAL_DELAY_MS:300000}
        fixed-delay-ms: ${BENEFIT_RAG_SYNC_FIXED_DELAY_MS:3600000}
        delay-ms: ${BENEFIT_RAG_SYNC_DELAY_MS:0}
    stores:
      seed:
        enabled: ${STORE_INDEX_SEED_ENABLED:${AI_INDEXING_ENABLED:false}}
  cookie:
    domain: ${COOKIE_DOMAIN:}
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAME_SITE:Lax}
  oauth2:
    new-user-redirect-uri: ${OAUTH2_NEW_USER_REDIRECT_URI:http://localhost:5173/login?step=oauthIntegration&verifiedType=oauth}
    exist-user-redirect-uri: ${OAUTH2_EXIST_USER_REDIRECT_URI:http://localhost:5173/login?oauth=processing}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: ["health", "info"]
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false
    elasticsearch:
      enabled: false
    redis:
      enabled: false

octomo:
  api:
    base-url: ${OCTOMO_API_BASE_URL:https://api.octoverse.kr/octomo/v1}
    key: ${OCTOMO_API_KEY:}
  receiver-phone: ${OCTOMO_RECEIVER_PHONE:1666-3538}
