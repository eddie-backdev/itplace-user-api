spring:
  jpa:
    hibernate:
      ddl-auto: update

  datasource:
    source:
      driver-class-name: org.postgresql.Driver
      jdbc-url: ${PG_URL}
      username: ${PG_USERNAME}
      password: ${PG_PASSWORD}
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
    replica:
      driver-class-name: org.postgresql.Driver
      jdbc-url: ${PG_REPLICA_URL:${PG_URL}}
      username: ${PG_REPLICA_USERNAME:${PG_USERNAME}}
      password: ${PG_REPLICA_PASSWORD:${PG_PASSWORD}}
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
    mongodb:
      uri: ${MONGODB_URI}

  jwt:
    secret: ${JWT_SECRET}
    access-token-validity-in-seconds: ${JWT_ACCESS_TOKEN_SECONDS:3600}
    refresh-token-validity-in-seconds: ${JWT_REFRESH_TOKEN_SECONDS:86400}

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      organization-id: ${OPENAI_ORGANIZATION_ID:}
    chat:
      categorizePrompt: classpath:prompt/categorizePrompt.txt
      reasonPrompt: classpath:prompt/reasonPrompt.txt

  security:
    oauth2:
      client:
        registration:
          kakao:
            redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/login/oauth2/code/kakao}
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}

  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

elasticsearch:
  host: ${ELASTICSEARCH_HOST:localhost}
  port: ${ELASTICSEARCH_PORT:9200}
  username: ${ELASTICSEARCH_USERNAME:elastic}
  password: ${ELASTICSEARCH_PASSWORD}

coolsms:
  api:
    key: ${COOLSMS_API_KEY}
    secret: ${COOLSMS_API_SECRET}
  fromPhone: ${COOLSMS_FROM_PHONE}

google:
  recaptcha:
    key:
      secret: ${GOOGLE_RECAPTCHA_SECRET}

app:
  cookie:
    domain: ""
    secure: false
    same-site: Lax
  oauth2:
    new-user-redirect-uri: ${OAUTH2_NEW_USER_REDIRECT_URI:http://localhost:5173/login?step=oauthIntegration&verifiedType=oauth}
    exist-user-redirect-uri: ${OAUTH2_EXIST_USER_REDIRECT_URI:http://localhost:5173/login?oauth=processing}

logging:
  level:
    org.springframework.web: INFO
    org.springframework.web.servlet.DispatcherServlet: INFO
    com.fasterxml.jackson.databind: WARN

octomo:
  api:
    base-url: ${OCTOMO_API_BASE_URL:https://api.octoverse.kr/octomo/v1}
    key: ${OCTOMO_API_KEY:}
  receiver-phone: ${OCTOMO_RECEIVER_PHONE:1666-3538}
