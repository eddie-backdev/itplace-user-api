name: OCI Blue-Green Deploy (user-api)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: user-api-oci-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_REPOSITORY: ghcr.io/eddie-backdev/itplace-user-api
      REMOTE_SCRIPT_PATH: /home/ubuntu/app/scripts/deploy-userapi.sh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Test and build application JAR
        run: ./gradlew test bootJar --no-daemon

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA tag
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:latest
            ${{ env.IMAGE_REPOSITORY }}:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Ensure remote deploy script directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/app/scripts

      - name: Copy deploy script to OCI
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: scripts/deploy-userapi.sh
          target: /home/ubuntu/app/scripts
          strip_components: 1

      - name: Run blue-green deployment on OCI
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            chmod +x ${{ env.REMOTE_SCRIPT_PATH }}
            REGISTRY_HOST=ghcr.io \
            IMAGE_REPOSITORY=${{ env.IMAGE_REPOSITORY }} \
            GHCR_USERNAME=${{ secrets.GHCR_USERNAME }} \
            GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}' \
            ${{ env.REMOTE_SCRIPT_PATH }} ${{ steps.vars.outputs.short_sha }}
