name: OCI Blue-Green Deploy (user-api)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: user-api-oci-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_REPOSITORY: ghcr.io/eddie-backdev/itplace-user-api
      REMOTE_SCRIPT_PATH: /home/ubuntu/app/scripts/deploy-userapi.sh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Test and build application JAR
        run: ./gradlew test bootJar --no-daemon

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA tag
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:latest
            ${{ env.IMAGE_REPOSITORY }}:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Ensure remote deploy script directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/app/scripts

      - name: Copy deploy script to OCI
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: scripts/deploy-userapi.sh
          target: /home/ubuntu/app/scripts
          strip_components: 1

      - name: Run blue-green deployment on OCI
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            chmod +x ${{ env.REMOTE_SCRIPT_PATH }}
            REGISTRY_HOST=ghcr.io \
            IMAGE_REPOSITORY=${{ env.IMAGE_REPOSITORY }} \
            GHCR_USERNAME=${{ secrets.GHCR_USERNAME }} \
            GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}' \
            ${{ env.REMOTE_SCRIPT_PATH }} ${{ steps.vars.outputs.short_sha }}

      - name: Notify deployment result to Discord
        if: ${{ always() }}
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
          DEPLOY_STATUS: ${{ job.status }}
          SERVICE_NAME: user-api
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ -z "${DISCORD_WEBHOOK_URL}" ]]; then
            echo "::warning::DISCORD_DEPLOY_WEBHOOK_URL secret is not configured"
            exit 0
          fi

          python3 <<'PY' > discord-payload.json
          import json
          import os
          from datetime import datetime, timezone

          status = os.environ["DEPLOY_STATUS"]
          icon, label, color = {
              "success": ("✅", "성공", 0x57F287),
              "failure": ("❌", "실패", 0xED4245),
              "cancelled": ("⚠️", "취소", 0xFEE75C),
          }.get(status, ("ℹ️", status, 0x5865F2))

          payload = {
              "username": "ITPLACE Deploy",
              "allowed_mentions": {"parse": []},
              "embeds": [{
                  "title": f"{icon} [{os.environ['SERVICE_NAME']}] 운영 배포 {label}",
                  "url": os.environ["RUN_URL"],
                  "color": color,
                  "fields": [
                      {"name": "저장소", "value": f"`{os.environ['REPOSITORY']}`", "inline": False},
                      {"name": "브랜치", "value": f"`{os.environ['BRANCH_NAME']}`", "inline": True},
                      {"name": "커밋", "value": f"`{os.environ['COMMIT_SHA'][:7]}`", "inline": True},
                      {"name": "실행자", "value": os.environ["ACTOR"], "inline": True},
                  ],
                  "footer": {"text": "GitHub Actions · 상세 내용은 제목을 누르세요"},
                  "timestamp": datetime.now(timezone.utc).isoformat(),
              }],
          }
          json.dump(payload, fp=__import__("sys").stdout, ensure_ascii=False)
          PY

          curl -fsS \
            --connect-timeout 5 \
            --max-time 15 \
            -H 'Content-Type: application/json' \
            --data @discord-payload.json \
            "${DISCORD_WEBHOOK_URL}"
